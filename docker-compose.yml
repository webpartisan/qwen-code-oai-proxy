services:
  qwen-proxy:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./.qwen:/root/.qwen
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-8080}
      - HOST=${HOST:-0.0.0.0}
      - DEBUG_LOG=${DEBUG_LOG:-false}
      - LOG_FILE_LIMIT=${LOG_FILE_LIMIT:-20}
      - LOG_LEVEL=${LOG_LEVEL:-error}
      - STREAM=${STREAM:-false}
      - DEFAULT_ACCOUNT=${DEFAULT_ACCOUNT:-}
      - QWEN_CODE_AUTH_USE=${QWEN_CODE_AUTH_USE:-true}
      - API_KEY=${API_KEY:-}
      # Proxy configuration
      - PROXY_LIST=${PROXY_LIST:-}
      - USE_DEFAULT_PROXY_WITH_LIST=${USE_DEFAULT_PROXY_WITH_LIST:-false}
      - PROXY_CONSECUTIVE_NETWORK_ERRORS=${PROXY_CONSECUTIVE_NETWORK_ERRORS:-3}
      - BAD_PROXY_COOLDOWN_MS=${BAD_PROXY_COOLDOWN_MS:-600000}
      - PROXY_RECOVERY_CHECK_INTERVAL_MS=${PROXY_RECOVERY_CHECK_INTERVAL_MS:-60000}
      - MAX_REQUESTS_PER_MINUTE_PER_IP=${MAX_REQUESTS_PER_MINUTE_PER_IP:-60}
      # Rate limit configuration
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-60}
      - RATE_LIMIT_RETRY_DELAY_MS=${RATE_LIMIT_RETRY_DELAY_MS:-2000}
      - RATE_LIMIT_MAX_RETRIES=${RATE_LIMIT_MAX_RETRIES:-5}
      # Retry configuration
      - MAX_RETRIES=${MAX_RETRIES:-5}
      - RETRY_DELAY_MS=${RETRY_DELAY_MS:-1000}

    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const req = require('http').request({ hostname: 'localhost', port: '${PORT:-8080}', path: '/health', method: 'GET', headers: { 'X-API-Key': '${API_KEY:-}' } }, (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }); req.on('error', () => process.exit(1)); req.end();",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
